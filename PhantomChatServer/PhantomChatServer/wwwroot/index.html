<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PhantomChat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="connection-banner">Connection lost. Attempting to reconnect...</div>

    <div id="app-container">
        <div id="mobile-overlay"></div>

        <aside id="sidebar">
            <div class="sidebar-header">
                <h3>PhantomChat</h3>
                <div class="user-profile-box">
                    <span class="user-label">USER PROFILE</span>
                    <div id="user-status" title="Click to change your nickname">Connecting...</div>
                </div>
            </div>

            <div class="sidebar-scrollable">
                <div class="sidebar-section section-groups">
                    <div class="section-header">
                        <h4>Channels</h4>
                        <button id="add-group-btn" title="Create or Join Group">+</button>
                    </div>
                    <ul id="channels-list">
                        <li data-id="Global" data-target="Global" data-isdm="false" class="channel-item active">
                            <span class="name"># Global</span>
                            <span class="badge" style="display: none;">0</span>
                        </li>
                    </ul>
                </div>

                <div class="sidebar-section section-dms">
                    <h4>Direct Messages</h4>
                    <ul id="dms-list"></ul>
                </div>

                <div class="sidebar-section section-users">
                    <h4>Online Users</h4>
                    <ul id="online-users-list"></ul>
                </div>
            </div>

            <div class="sidebar-footer">
                <div id="uuid-display"></div>
                <div class="credits">
                    <strong>PhantomChat Enterprise v1.2</strong><br>
                    Development: Nikos Georgousis<br>
                    <span>Open Source</span>
                </div>
            </div>
        </aside>

        <main id="chat-area">
            <header id="chat-header">
                <div class="header-left">
                    <button id="mobile-menu-btn" title="Toggle Menu">☰</button>
                    <div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <h2 id="current-channel-name"># Global</h2>
                            <button id="invite-user-btn" title="Invite an online user to this room" style="display: none; background: transparent; border: 1px solid var(--accent-color); color: var(--accent-hover); padding: 2px 8px; font-size: 0.7rem; border-radius: 4px; cursor: pointer;">+ Invite</button>
                        </div>
                        <div id="group-members"></div>
                    </div>
                </div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button id="theme-btn" title="Click to cycle ambient workspace tint for this room">🎨 Theme: Matrix</button>
                    <button id="sound-btn" title="Click to cycle audio alerts for this room">𔀨 Sound: OFF</button>
                    <button id="group-settings-btn" title="Group Settings (Creator Only)" style="display: none; background: transparent; border: 1px solid var(--border-line); color: var(--text-muted); padding: 4px 10px; font-size: 0.75rem; border-radius: 4px; cursor: pointer;">⚙ Settings</button>
                    <button id="wipe-btn" title="Wipe My Messages Here">Clear History</button>
                </div>
            </header>

            <div id="messages"></div>

            <div id="input-area">
                <div id="emoji-picker" class="hidden"></div>
                <button id="emoji-btn" title="Add Emoji">😀</button>
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" />
                <button id="send-btn">Send</button>
            </div>
        </main>
    </div>

    <script src="signalr.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
